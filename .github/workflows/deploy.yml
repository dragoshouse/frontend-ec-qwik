name: Build & Deploy to Firebase

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      # Checkout del código
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Instalar dependencias
      - name: Install dependencies
        run: npm ci

      # Type check
      - name: Type checking
        run: npm run build.types
        continue-on-error: true

      # Lint
      - name: Lint code
        run: npm run lint
        continue-on-error: true

      # Build
      - name: Build project
        run: npm run build
        env:
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}

      # Deploy a Firebase (solo en main, no en PRs)
      - name: Deploy to Firebase Hosting
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: catallog-experiences

      # Comentar en PR con deploy preview (si es pull request)
      - name: Comment deployment status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Build successful! Preview deployment ready.\n\nNext: Once this PR is merged to main, it will automatically deploy to production.'
            })

      # Notificar en Slack (opcional)
      - name: Notify deployment
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "✅ Deployed to Firebase Hosting"
          echo "Project: catallog-experiences"
          echo "URL: https://catallog-experiences.web.app"

      # Upload build artifacts (opcional, para debugging)
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: dist
          retention-days: 7
